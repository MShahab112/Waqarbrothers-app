<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main background: deep navy to near-black -->
    <radialGradient id="bg" cx="42%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#0d1f42"/>
      <stop offset="50%" stop-color="#06101f"/>
      <stop offset="100%" stop-color="#020609"/>
    </radialGradient>
    <!-- Cyan ambient glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Glass ring: cyan-to-indigo -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Top gloss highlight -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- W letter gradient -->
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <!-- B letter gradient -->
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <!-- Cyan dot glow -->
    <radialGradient id="dotg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </radialGradient>
    <!-- Inner shadow -->
    <filter id="inset" x="-50%" y="-50%" width="200%" height="200%">
      <feComposite in="SourceGraphic" in2="SourceGraphic" operator="arithmetic" k2="1"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Cyan glow layer -->
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- Inner depth shadow ring -->
  <rect width="512" height="512" rx="108" fill="none"
        stroke="#000000" stroke-width="20" stroke-opacity="0.5"/>

  <!-- Glassmorphism border ring -->
  <rect x="1.2" y="1.2" width="509.6" height="509.6" rx="107"
        fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <!-- Top gloss — upper half lighter feel -->
  <rect width="512" height="260" rx="108" fill="url(#gloss)"/>

  <!-- ── W LETTER ── -->
  <!-- W centered-left: starts x=88, width=168 -->
  <polyline
    points="88,170 134,340 180,238 226,340 272,170"
    fill="none"
    stroke="url(#wg)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- ── CYAN ACCENT DOT (separator / &-accent) ── -->
  <circle cx="256" cy="256" r="11" fill="url(#dotg)"/>
  <circle cx="256" cy="256" r="6" fill="#a5f3fc" opacity="0.7"/>

  <!-- ── B LETTER ── -->
  <!-- B: vertical stem + 2 bumps, starting x=280 -->
  <line x1="280" y1="170" x2="280" y2="340"
        stroke="url(#bg2)" stroke-width="32" stroke-linecap="round"/>
  <!-- top bump -->
  <path d="M280,170 Q375,170 375,213 Q375,255 280,255"
        fill="none" stroke="url(#bg2)" stroke-width="27"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom bump (wider) -->
  <path d="M280,255 Q385,255 385,297 Q385,340 280,340"
        fill="none" stroke="url(#bg2)" stroke-width="27"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom inner vignette for depth -->
  <rect y="400" width="512" height="112" rx="0" fill="#000" fill-opacity="0.15"/>
  <rect y="450" width="512" height="62" rx="108" fill="#000" fill-opacity="0.12"/>
</svg>
